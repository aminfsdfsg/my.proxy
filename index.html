<!DOCTYPE html>
<html>
<head>
    <title>My Secure Proxy</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f5f5f5; }
        iframe { width: 100%; height: 85vh; border: 1px solid #ccc; margin-top: 10px; background: white; }
        input { width: 70%; padding: 10px; border: 1px solid #ddd; }
        button { padding: 10px 15px; background: #333; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Enter a Website URL</h2>
    <input type="text" id="url" value="https://chatgpt.com">
    <button onclick="loadPage()">Go</button>
    <iframe id="content"></iframe>

    <script>
        const corsProxyList = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?url=',
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://cors-anywhere.herokuapp.com/',
            'https://yacdn.org/proxy/'
        ];

        async function loadPage() {
            const targetUrl = document.getElementById('url').value;
            const iframe = document.getElementById('content');
            
            iframe.src = 'about:blank';
            
            for (const corsProxy of corsProxyList) {
                try {
                    const response = await fetch(corsProxy + encodeURIComponent(targetUrl));
                    if (response.ok) {
                        const html = await response.text();
                        const blob = new Blob([html], {type: 'text/html'});
                        iframe.src = URL.createObjectURL(blob);
                        document.querySelector('h2').textContent = 'Connected!';
                        return;
                    }
                } catch (e) {
                    console.log('Trying next proxy...');
                }
            }
            
            alert('Could not connect through any proxy. Please try again later.');
        }
        
        window.onload = () => {
            document.getElementById('url').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') loadPage();
            });
            loadPage();
        };
    </script>
</body>
</html>
